openapi: 3.0.3
info:
  title: Casting API
  description: Multi-tenant casting management API
  version: 1.0.0
  contact:
    name: Lyrisphere
    url: https://lyrisphere.com
servers:
  - url: https://gozussastelqyolweech.supabase.co/functions/v1/casting-api/v1
    description: Production server
security:
  - ApiKeyAuth: []
paths:
  /{tenant}/castings:
    get:
      summary: List castings for tenant
      description: Retrieve all active castings for the specified tenant
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
          description: Tenant identifier
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of castings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Casting'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create a new casting
      description: Create a new casting opportunity
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCastingRequest'
      responses:
        '201':
          description: Casting created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Casting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /{tenant}/castings/{castingId}:
    get:
      summary: Get casting details
      description: Retrieve detailed information about a specific casting
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
        - name: castingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Casting details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CastingDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /{tenant}/applications:
    post:
      summary: Submit application
      description: Submit an application to a casting
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: Application submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /{tenant}/scoring/calculate:
    post:
      summary: Calculate casting scores
      description: Calculate scores for all applications in a casting using the tenant's scoring criteria
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                casting_id:
                  type: string
                  format: uuid
              required:
                - casting_id
      responses:
        '200':
          description: Scoring results
          content:
            application/json:
              schema:
                type: object
                properties:
                  scoring_results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoringResult'
                  role_assignments:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoleAssignment'
                  casting_context:
                    $ref: '#/components/schemas/CastingContext'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /{tenant}/webhooks:
    get:
      summary: List webhook endpoints
      description: Retrieve all webhook endpoints for the tenant
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of webhook endpoints
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookEndpoint'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key for tenant authentication
  
  schemas:
    Casting:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        deadline:
          type: string
          format: date-time
        location:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        professional_profiles:
          $ref: '#/components/schemas/ProfessionalProfile'
        casting_roles:
          type: array
          items:
            $ref: '#/components/schemas/CastingRole'
    
    CastingDetail:
      allOf:
        - $ref: '#/components/schemas/Casting'
        - type: object
          properties:
            requirements:
              type: string
            compensation_type:
              type: string
              enum: [paid, unpaid, profit_sharing, travel_expenses]
            compensation_amount:
              type: number

    CastingRole:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role_name:
          type: string
        voice_type:
          type: string
        description:
          type: string
        quantity_needed:
          type: integer
          minimum: 1
        is_lead_role:
          type: boolean

    ProfessionalProfile:
      type: object
      properties:
        company_name:
          type: string
        contact_email:
          type: string
          format: email
        bio:
          type: string

    Application:
      type: object
      properties:
        id:
          type: string
          format: uuid
        casting_id:
          type: string
          format: uuid
        artist_profile_id:
          type: string
          format: uuid
        cover_letter:
          type: string
        motivation:
          type: string
        applied_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, reviewed, accepted, rejected, waitlisted]

    ScoringResult:
      type: object
      properties:
        applicant_id:
          type: string
          format: uuid
        total_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        criteria_scores:
          type: array
          items:
            $ref: '#/components/schemas/CriteriaScore'
        recommendation:
          type: string
          enum: [accept, reject, waitlist, shortlist]
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1

    CriteriaScore:
      type: object
      properties:
        criteria_name:
          type: string
        raw_score:
          type: number
          format: float
        weighted_score:
          type: number
          format: float
        notes:
          type: string
        scored_at:
          type: string
          format: date-time

    RoleAssignment:
      type: object
      properties:
        role_id:
          type: string
          format: uuid
        applicant_id:
          type: string
          format: uuid
        score:
          type: number
          format: float
        rank:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [assigned, backup, waitlisted]

    CastingContext:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        casting:
          type: object
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
            roles:
              type: array
              items:
                $ref: '#/components/schemas/CastingRole'
            deadline:
              type: string
              format: date-time
            location:
              type: string
        scoring_criteria:
          $ref: '#/components/schemas/ScoringCriteria'

    ScoringCriteria:
      type: object
      properties:
        vocal_range:
          $ref: '#/components/schemas/ScoringWeight'
        experience:
          $ref: '#/components/schemas/ScoringWeight'
        availability:
          $ref: '#/components/schemas/ScoringWeight'
        location_proximity:
          $ref: '#/components/schemas/ScoringWeight'
        repertoire:
          $ref: '#/components/schemas/ScoringWeight'

    ScoringWeight:
      type: object
      properties:
        weight:
          type: number
          format: float
          minimum: 0
          maximum: 1
        method:
          type: string
          enum: [linear, exponential, threshold]
        min_value:
          type: number
        max_value:
          type: number
        settings:
          type: object

    CreateCastingRequest:
      type: object
      required:
        - title
        - description
        - deadline
        - professional_profile_id
      properties:
        title:
          type: string
        description:
          type: string
        deadline:
          type: string
          format: date-time
        location:
          type: string
        requirements:
          type: string
        compensation_type:
          type: string
          enum: [paid, unpaid, profit_sharing, travel_expenses]
        compensation_amount:
          type: number
        professional_profile_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: object
            properties:
              role_name:
                type: string
              voice_type:
                type: string
              description:
                type: string
              quantity_needed:
                type: integer
                minimum: 1
              is_lead_role:
                type: boolean

    CreateApplicationRequest:
      type: object
      required:
        - casting_id
        - artist_profile_id
        - cover_letter
        - motivation
      properties:
        casting_id:
          type: string
          format: uuid
        artist_profile_id:
          type: string
          format: uuid
        cover_letter:
          type: string
          minLength: 50
        motivation:
          type: string
          minLength: 20
        availability_notes:
          type: string

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  parameters:
    TenantPath:
      name: tenant
      in: path
      required: true
      schema:
        type: string
      description: Tenant identifier
    
    IdempotencyKey:
      name: x-idempotency-key
      in: header
      schema:
        type: string
      description: Idempotency key for safe retries